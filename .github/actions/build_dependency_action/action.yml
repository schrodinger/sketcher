inputs:
  platform:
    description: 'platform on which we are building'
    required: true
  deps_sha:
    description: 'commit hash of the last change to the dependencies file'
    required: true
  library:
    description: 'Name of the dependency to build'
    required: true
  version:
    description: 'Version of the dependency to build'
    required: true

runs:
  using: "composite"
  steps:
    - name: Check for a cached build
      id: cache-check
      uses: actions/cache@v3
      with:
        path: ./dependencies/${{ inputs.platform }}_${{ inputs.deps_sha }}_${{ inputs.library }}
        key: ${{ inputs.platform }}_${{ inputs.deps_sha }}_${{ inputs.library }}

    - name: Setup the build environment
      if: steps.cache-check.outputs.cache-hit != 'true'
      uses: mamba-org/setup-micromamba@v1
      with:
        micromamba-version: 'latest'
        environment-file: dependencies/${{ inputs.platform }}_environment.yml
        init-shell: bash
        cache-environment: true
        post-cleanup: 'none'

    - name: Run build script
      if: ${{ steps.cache-check.outputs.cache-hit != 'true' && success() }}
      shell: bash -l {0}
      run: |
        # if [ -f ${CONDA_PREFIX}/etc/conda/activate.d/vs2019_compiler_vars.bat }}.sh ]; then
        #   cmd.exe /c ${CONDA_PREFIX}/etc/conda/activate.d/vs2019_compiler_vars.bat
        # fi
        export CC=cl.exe
        export CMAKE_ARGS=-DCMAKE_BUILD_TYPE=Release
        export CMAKE_GEN='Visual Studio 16 2019'
        export CMAKE_GENERATOR='Visual Studio 16 2019'
        export CMAKE_GENERATOR_PLATFORM=x64
        export CMAKE_GENERATOR_TOOLSET=v142
        export CMAKE_PLAT=x64
        export CONDA_BUILD_CROSS_COMPILATION=0
        export CXX=cl.exe
        export DISTUTILS_USE_SDK=1
        export MSSdk=1
        export MSYS2_ARG_CONV_EXCL='/AI;/AL;/OUT;/out'
        export MSYS2_ENV_CONV_EXCL=CL
        export NEWER_VS_WITH_OLDER_VC=0
        export PY_VCRUNTIME_REDIST='\bin\vcruntime140.dll'
        export USE_NEW_CMAKE_GEN_SYNTAX=1
        export VCVARSBAT=64
        export VS_MAJOR=16
        export VS_VERSION=16.0
        export VS_YEAR=2019
        export VSINSTALLDIR='C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\'
        export WindowsSdkDir='C:\Program Files (x86)\Windows Kits\10\'
        export WindowsSDKVer=10.0.17763.0
        if [ -f dependencies/build_${{ inputs.library }}.sh ]; then
          ./dependencies/build_${{ inputs.library }}.sh ${{ inputs.platform }} ${{ inputs.version }} ${{ inputs.deps_sha }}
        else
          echo Failed to find an appropriate script to build ${{ inputs.library }} on ${{ inputs.platform }}
          exit 1
        fi

