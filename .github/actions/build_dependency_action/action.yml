inputs:
  platform:
    description: 'platform on which we are building'
    required: true
  deps_sha:
    description: 'commit hash of the last change to the dependencies file'
    required: true
  library:
    description: 'Name of the dependency to build'
    required: true
  version:
    description: 'Version of the dependency to build'
    required: true

runs:
  using: "composite"
  steps:
    - name: Check for a cached build
      id: cache-check
      uses: actions/cache@v3
      with:
        path: ./dependencies/${{ inputs.platform }}_${{ inputs.deps_sha }}_${{ inputs.library }}
        key: ${{ inputs.platform }}_${{ inputs.deps_sha }}_${{ inputs.library }}

    - name: Setup the build environment
      if: steps.cache-check.outputs.cache-hit != 'true'
      uses: mamba-org/setup-micromamba@v1
      with:
        micromamba-version: 'latest'
        environment-file: dependencies/${{ inputs.platform }}_environment.yml
        init-shell: bash
        cache-environment: true
        post-cleanup: 'none'

    - name: Inspect env
      shell: bash -l {0}
      run: |
        export
        echo $(pwd)
        vdir
        echo /c/Users/runneradmin/micromamba/envs/sketcher_builder:
        vdir /c/Users/runneradmin/micromamba/envs/sketcher_builder
        echo /c/Users/runneradmin/micromamba/envs/sketcher_builder/Library/mingw-w64/bin:
        vdir /c/Users/runneradmin/micromamba/envs/sketcher_builder/Library/mingw-w64/bin
        echo /c/Users/runneradmin/micromamba/envs/sketcher_builder/Library/usr/bin:
        vdir /c/Users/runneradmin/micromamba/envs/sketcher_builder/Library/usr/bin
        echo /c/Users/runneradmin/micromamba/envs/sketcher_builder/Library/bin:
        vdir /c/Users/runneradmin/micromamba/envs/sketcher_builder/Library/bin
        echo /c/Users/runneradmin/micromamba/envs/sketcher_builder/Scripts:
        vdir /c/Users/runneradmin/micromamba/envs/sketcher_builder/Scripts
        echo /c/Users/runneradmin/micromamba/envs/sketcher_builder/bin:
        vdir /c/Users/runneradmin/micromamba/envs/sketcher_builder/bin
        echo /c/Users/runneradmin/micromamba/condabin:
        vdir /c/Users/runneradmin/micromamba/condabin
        echo /c/Users/runneradmin/bin:
        vdir /c/Users/runneradmin/bin

