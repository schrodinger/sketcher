name: "build-external"
description: "Either builds an external dependency or fetches it from cache"

inputs:
  library:
    description: "Name of the dependency to build"
    required: true
  version:
    description: "Version of the dependency to build"
    required: true
  required_packages:
    description: "Packages to apt-get install before building"
    required: false
    default: ""

outputs:
  path:
    description: "Path to the installed dependency"
    # FIXME: collapse this with cache-check.path
    value: build/external/${{ inputs.library }}-${{ inputs.version }}

runs:
  using: "composite"
  steps:
    - uses: actions/cache@v4
      id: cache-check
      with:
        path: build/external/${{ inputs.library }}-${{ inputs.version }}
        key: ${{ inputs.library }}-${{ inputs.version }}-${{ runner.os }}-${{ matrix.build-output }}

    - name: Install required packages
      if: ${{ inputs.required_packages != '' }}
      shell: bash
      run: sudo apt-get install ${{ inputs.required_packages }}

    - name: Build library
      if: ${{ steps.cache-check.outputs.cache-hit != 'true' }}
      shell: bash
      run: |
        cmake --build build/external/ --target ${{ inputs.library }} \
              --config ${{ env.BUILD_TYPE }} || C:/Windows/system32/cmd.exe /C "cd /D D:/a/sketcher/sketcher/build/external/qt-prefix/src/qt-build/qtbase/src/3rdparty/libpng && D:/a/sketcher/sketcher/build/external/qt-prefix/src/qt-build/qtbase/bin/syncqt.exe @D:/a/sketcher/sketcher/build/external/qt-prefix/src/qt-build/qtbase/src/3rdparty/libpng/PngPrivate_syncqt_args && "C:\Program Files\CMake\bin\cmake.exe" -E touch D:/a/sketcher/sketcher/build/external/qt-prefix/src/qt-build/qtbase/src/3rdparty/libpng/PngPrivate_syncqt_timestamp"