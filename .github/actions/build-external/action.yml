name: "build-external"
description: "Either builds an external dependency or fetches it from cache"

inputs:
  library:
    description: "Name of the dependency to build"
    required: true
  version:
    description: "Version of the dependency to build"
    required: true
  my_debug:
    description: "For debugging"
    required: false
    default: false

outputs:
  path:
    description: "Path to the installed dependency"
    # FIXME: collapse this with cache-check.path
    value: build/external/${{ inputs.library }}-${{ inputs.version }}

runs:
  using: "composite"
  steps:
    - uses: actions/cache@v4
      id: cache-check
      with:
        path: build/external/${{ inputs.library }}-${{ inputs.version }}
        key: ${{ inputs.library }}-${{ inputs.version }}-${{ runner.os }}-${{ matrix.build-output }}

    - name: Build library
      if: ${{ steps.cache-check.outputs.cache-hit != 'true' }}
      shell: bash
      run: |
        ${{ runner.os == 'windows' && 'PATH=`echo $PATH | tr ":" "\\n" | grep -iv "Strawberry" | tr "\\n" ":"` mingw-get update && mingw-get upgrade && ' || '' }}
        cmake --build build/external/ --target ${{ inputs.library }} \\
              --config ${{ env.BUILD_TYPE }} \\
        ${{ runner.os == 'windows' && ' || true ' || '' }}

    - name: Syncqt help
      if: ${{ inputs.my_debug && runner.os == 'windows' }}
      shell: cmd
      run: D:\\a\\sketcher\\sketcher\\build\\external\\qt-prefix\\src\\qt-build\\qtbase\\bin\\syncqt.exe -help

    - name: Test syncqt
      if: ${{ inputs.my_debug && runner.os == 'windows' }}
      shell: cmd
      run: |
        cd /D D:\\a\\sketcher\\sketcher\\build\\external\\qt-prefix\\src\\qt-build\\qtbase\\src\\corelib && \
        D:\\a\\sketcher\\sketcher\\build\\external\\qt-prefix\\src\\qt-build\\qtbase\\bin\\syncqt.exe @D:/a/sketcher/sketcher/build/external/qt-prefix/src/qt-build/qtbase/src/corelib/Core_syncqt_args
