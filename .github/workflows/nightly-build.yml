name: Nightly Build

on:
  workflow_dispatch:
    inputs:
      target-branch:
        description: 'Branch to build'
        required: true
        type: string
      release-branch:
        description: 'Release branch to merge from (when target is main)'
        required: false
        type: string
      token:
        description: 'Token with push permissions'
        required: false
        type: string

jobs:
  nightly-build:
    runs-on: ubuntu-latest
    outputs:
      has_recent_commits: ${{ steps.check-commits.outputs.has_recent_commits }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target-branch }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git remote set-url origin https://x-access-token:${{ inputs.token }}@github.com/${{ github.repository }}.git

      - name: Merge release branch into main
        if: inputs.target-branch != 'main'
        env:
          GITHUB_TOKEN: ${{ inputs.token }}
        run: |
          git fetch origin ${{ inputs.release-branch }}
          git merge origin/${{ inputs.release-branch }} --no-ff -m "Merge ${{ inputs.release-branch }} into main"
          git push origin main

      - name: Check for recent commits
        id: check-commits
        run: |
          has_recent=$(git log origin/${{ inputs.target-branch }} --since="24 hours ago" --oneline | grep -v "GitHub Action" | wc -l)
          echo "has_recent_commits=$([ $has_recent -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Increment patch version for build
        if: steps.check-commits.outputs.has_recent_commits == 'true'
        run: |
          current_version=$(grep "VERSION " CMakeLists.txt | grep -oE "[0-9]+\.[0-9]+\.[0-9]+")
          new_version=$(echo $current_version | awk -F. '{print $1"."$2"."($3+1)}')
          sed -i "s/VERSION $current_version/VERSION $new_version/" CMakeLists.txt
          echo "NEW_VERSION=$new_version" >> $GITHUB_ENV

      - name: Commit build version increment
        if: steps.check-commits.outputs.has_recent_commits == 'true'
        env:
          GITHUB_TOKEN: ${{ inputs.token }}
        run: |
          git add CMakeLists.txt
          git commit -m "Increment to build ${{ env.NEW_VERSION }}"
          git push origin ${{ inputs.target-branch }}

  build-and-test:
    needs: nightly-build
    if: needs.nightly-build.outputs.has_recent_commits == 'true'
    uses: ./.github/workflows/sketcher-builder.yml
    with:
      ref: ${{ inputs.target-branch }}
