name: Nightly Build

on:
  workflow_dispatch:
    inputs:
      release-branches:
        description: '[Optional] Comma-separated release branches to build (e.g. 26-1,26-2)'
        required: false
        type: string
      dry-run:
        description: 'Skip npm publishing'
        required: false
        type: boolean
        default: false

jobs:
  parse-inputs:
    runs-on: ubuntu-latest
    outputs:
      branches: ${{ steps.parse.outputs.branches }}
    steps:
      - id: parse
        env:
          RELEASE_BRANCHES: ${{ inputs.release-branches }}
        run: |
          branches=$(echo "$RELEASE_BRANCHES" | \
            python3 -c "import sys,json; s=sys.stdin.read().strip(); \
            print(json.dumps([b.strip() for b in s.split(',') if b.strip()]))")
          echo "branches=$branches" >> $GITHUB_OUTPUT

  build-release-branch:
    needs: parse-inputs
    if: ${{ needs.parse-inputs.outputs.branches != '[]' }}
    strategy:
      matrix:
        branch: ${{ fromJson(needs.parse-inputs.outputs.branches) }}
    uses: ./.github/workflows/sketcher-builder.yml
    with:
      ref: ${{ matrix.branch }}
      publish-npm-package: ${{ !inputs.dry-run }}

  build-main-branch:
    uses: ./.github/workflows/sketcher-builder.yml
    with:
      ref: main
      publish-npm-package: ${{ !inputs.dry-run }}
