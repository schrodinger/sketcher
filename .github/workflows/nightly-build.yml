name: Nightly Build

on:
  workflow_dispatch:
    inputs:
      release-branch:
        description: '[Optional] Release branch to build'
        required: false
        type: string
      token:
        description: '[Optional] Token with push permissions for bump-and-merge'
        required: false
        type: string
      dry-run:
        description: 'Dry run mode - skip version bumps, merges, and npm publishing'
        required: false
        type: boolean
        default: false

jobs:
  bump-and-merge:
    if: inputs.token != ''
    runs-on: ubuntu-latest
    steps:
      - name: Check inputs
        env:
          TOKEN: ${{ inputs.token }}
        run: |
          echo "Token length: ${#TOKEN}"

          echo -n "$TOKEN" | wc -c

          if [[ "$TOKEN" == ghs_* ]]; then
            echo "✅ Token format starts with ghs_"
          else
            echo "❌ Token DOES NOT start with ghs_. It starts with: ${TOKEN_VAL:0:4}..."
          fi

          if [[ "$TOKEN" == "***" ]]; then
            echo "❌ ERROR: The token was masked (***) during the hand-off!"
          fi

      - name: Verify Token Validity
        env:
          TOKEN: ${{ inputs.token }}
        run: |
          set -x
          echo "Checking permissions for the generated token..."

          if [[ "$TOKEN" == ghs_* ]]; then
            RAW_TOKEN=$TOKEN
          else
            RAW_TOKEN=$(echo "$TOKEN" | base64 --decode)
          fi
          echo "::add-mask::$RAW_TOKEN"

          TARGET_REPO=sketcher

          RESPONSE=$(curl -s -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository_owner }}/$TARGET_REPO")

          echo "$RESPONSE"

          echo "--- Token Permissions for $TARGET_REPO ---"
          echo "$RESPONSE" | jq '.permissions'

      - name: Debug Token Permissions
        env:
          TOKEN: ${{ inputs.token }}
        run: |
          # 1. Check basic connectivity and token validity
          # 2. Extract the 'permissions' object for the first repo in the list
          echo "Checking permissions for the provided token..."

          RESPONSE=$(curl -s -H "Authorization: Bearer $$TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/installation/repositories)

          # Check if the response contains an error
          if echo "$RESPONSE" | grep -q "message"; then
            echo "::error::API Error: $(echo "$RESPONSE" | jq -r '.message')"
            exit 1
          fi

          # Print the granular permissions the token holds
          echo "--- Token Permissions ---"
          echo "$RESPONSE" | jq '.repositories[0].permissions'
        shell: bash

      - name: Configure Git
        run: |
          actor="${{ github.actor }}"
          echo "$actor"
          user_id=$(gh api "/users/$actor" --jq '.id')
          git config --global user.name "$actor"
          git config --global user.email "$user_id+$actor@users.noreply.github.com"
          #git remote set-url origin https://x-access-token:${{ inputs.token }}@github.com/${{ github.repository }}.git
          url="https://x-access-token:${{ inputs.token }}@github.com/${{ github.repository }}.git"
          git clone "$url" .
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Bump version on release branch
        if: inputs.release-branch != '' && !inputs.dry-run
        uses: ./.github/actions/bump-version
        with:
          branch: ${{ inputs.release-branch }}

      - name: Merge release branch into main
        id: auto-merge
        if: inputs.release-branch != '' && !inputs.dry-run
        continue-on-error: true  # Always version bump even if merge fails
        run: |
          git checkout main
          git merge origin/${{ inputs.release-branch }}
          url="https://x-access-token:${{ inputs.token }}@github.com/${{ github.repository }}.git"
          git push "$url" HEAD:main

      - name: Create issue on merge failure
        if: inputs.release-branch != '' && steps.auto-merge.outcome == 'failure' && !inputs.dry-run
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly build: ${context.payload.inputs['release-branch']} merge conflict`,
              body: `The nightly build workflow failed to merge \`${context.payload.inputs['release-branch']}\` into \`main\` due to merge conflicts.\n\nPlease resolve the conflicts manually and merge the release branch into main.\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      - name: Bump version on main branch
        if: '!inputs.dry-run'
        uses: ./.github/actions/bump-version
        with:
          branch: main

  # Create Nightly Builds

  build-release-branch:
    needs: bump-and-merge
    if: (false && !cancelled() && inputs.release-branch != '')
    uses: ./.github/workflows/sketcher-builder.yml
    with:
      ref: ${{ inputs.release-branch }}
      publish-npm-package: ${{ !inputs.dry-run }}

  build-main-branch:
    needs: bump-and-merge
    if: (false && !cancelled())
    uses: ./.github/workflows/sketcher-builder.yml
    with:
      ref: main
      publish-npm-package: ${{ !inputs.dry-run }}
