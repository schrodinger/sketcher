



name: Sketcher CI
run-name: ${{ runner.os }} Build -- ${{ github.ref }}
on: [push]
jobs:
  build-project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure
        uses: cmake ${{ github.workspace }} -B build_dir

      - name: Build
        runs: cmake --build build

      - name: Run Tests
        runs: ctest --test-dir build
