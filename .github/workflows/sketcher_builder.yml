name: Sketcher CI
on:
    workflow_dispatch: ~
    push: ~
#      branches:
#        - 'main'
#        - 'releases/**'


jobs:

    build_qt6:
        name: Build Qt6
        runs-on: windows-latest
        steps:
        - name: Checkout repo
          uses: actions/checkout@v3

        - name: Build qt6 v6.2.5 dependency
          uses: ./.github/actions/build_dependency_action
          with:
            platform: win32
            deps_sha: '000000'
            library: qt6
            version: 6.2.5

