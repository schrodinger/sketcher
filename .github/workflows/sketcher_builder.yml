name: Sketcher CI
on:
    workflow_dispatch: ~
    push: ~
#      branches:
#        - 'main'
#        - 'releases/**'


jobs:

    prepare_jobs:
        runs-on: ubuntu-latest
        outputs:
          jobs: ${{ steps.job-gen.outputs.jobs }}
          deps_sha: ${{ steps.job-gen.outputs.deps_sha }}
        steps:
        - name: Checkout repo
          uses: actions/checkout@v3

        - name: "Generate dependency build jobs matrix"
          uses: ./.github/actions/prepare_jobs_action
          id: job-gen

    base_deps:
        needs: prepare_jobs
        strategy:
            matrix: ${{ fromJson(needs.prepare_jobs.outputs.jobs) }}

        runs-on: ${{ matrix.os }}
        steps:
        - name: Checkout repo
          uses: actions/checkout@v3

        - name: Build ${{ matrix.library }} v${{ matrix.version }} dependency on ${{ matrix.platform }}
          uses: ./.github/actions/build_dependency_action
          with:
            platform: ${{ matrix.platform }}
            deps_sha: ${{ needs.prepare_jobs.outputs.deps_sha }}
            library: ${{ matrix.library }}
            version: ${{ matrix.version }}
